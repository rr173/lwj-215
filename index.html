<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目排程甘特图编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="toolbar">
            <h1>项目排程甘特图编辑器</h1>
            <div class="toolbar-actions">
                <button id="btn-view-toggle" class="btn">资源视图</button>
                <button id="btn-balance" class="btn btn-primary">自动平衡</button>
                <button id="btn-undo-balance" class="btn" disabled>撤销平衡</button>
                <button id="btn-export" class="btn">导出JSON</button>
                <button id="btn-import" class="btn">导入JSON</button>
                <input type="file" id="file-import" accept=".json" hidden>
            </div>
        </header>

        <div class="main">
            <aside class="sidebar">
                <div class="stats-panel">
                    <div class="stats-header" id="stats-header">
                        <span class="stats-toggle">▼</span>
                        <h3>进度统计</h3>
                    </div>
                    <div class="stats-content" id="stats-content">
                        <div class="stats-item">
                            <span class="stats-label">整体完成率</span>
                            <span class="stats-value" id="stats-completion">0%</span>
                        </div>
                        <div class="stats-progress-bar">
                            <div class="stats-progress-fill" id="stats-progress-fill"></div>
                        </div>
                        <div class="stats-item">
                            <span class="stats-label">滞后任务</span>
                            <span class="stats-value stats-warning" id="stats-lagging">0 个</span>
                        </div>
                        <div class="stats-item stats-baseline" id="stats-baseline-item" style="display:none;">
                            <span class="stats-label">平均偏差</span>
                            <span class="stats-value" id="stats-avg-deviation">0 天</span>
                        </div>
                        <div class="stats-item stats-baseline" id="stats-max-deviation-item" style="display:none;">
                            <span class="stats-label">最大偏差</span>
                            <span class="stats-value" id="stats-max-deviation">-</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-header">
                    <h2>任务列表</h2>
                    <div class="sidebar-header-btns">
                        <button id="btn-add-group" class="btn btn-sm">+ 分组</button>
                        <select id="select-task-type" class="select-task-type">
                            <option value="task">任务</option>
                            <option value="milestone">里程碑</option>
                        </select>
                        <button id="btn-add-task" class="btn btn-primary btn-sm">+ 新增</button>
                    </div>
                </div>
                <div id="task-list" class="task-list"></div>

                <div class="baseline-panel">
                    <div class="baseline-header">
                        <h3>基线管理</h3>
                        <button id="btn-save-baseline" class="btn btn-sm btn-primary">保存基线</button>
                    </div>
                    <div id="baseline-list" class="baseline-list"></div>
                </div>

                <div class="sidebar-footer">
                    <span id="task-count">0 / 100 个任务</span>
                </div>
            </aside>

            <section class="canvas-container">
                <div class="timeline-header">
                    <div class="timeline-sticky">时间轴</div>
                    <div id="timeline-scale-wrapper" class="timeline-scale-wrapper">
                        <div id="timeline-scale" class="timeline-scale"></div>
                    </div>
                </div>
                <div id="gantt-canvas" class="gantt-canvas">
                    <svg id="dependency-svg" class="dependency-svg"></svg>
                    <div id="gantt-rows" class="gantt-rows"></div>
                </div>
            </section>
        </div>

        <div id="toast" class="toast"></div>

        <div id="flash-overlay" class="flash-overlay"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
